{% extends 'base.html' %}

{% block title %}{{ post.title }} | Django Blog{% endblock %}

{% block content %}
<article class="card shadow-sm">
    <div class="card-body p-4">
        <h1 class="h3">{{ post.title }}</h1>
        <p class="text-muted mb-4">
            By {{ post.author.username }} on {{ post.created_at|date:"M d, Y" }}
        </p>
        {% if post.image %}
            <img src="{{ post.image.url }}" class="img-fluid rounded mb-4 w-100" alt="{{ post.title }}" style="max-height: 440px; object-fit: cover;">
        {% endif %}
        <p class="mb-0" style="white-space: pre-wrap;">{{ post.content }}</p>
    </div>
</article>
{% endblock %}
